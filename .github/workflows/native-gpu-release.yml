name: Native GPU Release Gate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  production-gpu-closure:
    # This label must resolve to a self-hosted runner with a hardware-backed
    # GPU adapter and an installed Metal, DX12, or Vulkan driver.
    runs-on: [self-hosted, native-gpu]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: native-gpu-release
          workspaces: |
            . -> target

      - name: Run production hardware GPU closure
        run: ./scripts/test-production-gpu-closure.sh
