name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native:
    name: Native check + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-native

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo test (rfgui lib)
        run: cargo test --lib -p rfgui

  wasm:
    name: wasm32 check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-wasm

      - name: cargo check --target wasm32 (rfgui)
        run: cargo check --target wasm32-unknown-unknown -p rfgui

      - name: cargo check --target wasm32 (examples)
        run: cargo check --target wasm32-unknown-unknown -p examples
