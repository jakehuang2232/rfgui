<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RFGUI Example</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f1115;
        --panel: rgba(20, 24, 32, 0.92);
        --border: rgba(113, 128, 150, 0.28);
        --text: #e5edf8;
        --muted: #93a4bd;
        --accent: #59b2ff;
      }

      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: var(--bg);
      }

      body {
        overflow: hidden;
        font-family: "Noto Sans TC", "PingFang TC", "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        outline: none;
      }

      .boot-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(89, 178, 255, 0.12), transparent 38%),
          linear-gradient(180deg, rgba(8, 10, 14, 0.88), rgba(15, 17, 21, 0.96));
        transition: opacity 180ms ease;
      }

      .boot-overlay.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .boot-card {
        width: min(360px, calc(100vw - 32px));
        padding: 24px 22px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      .boot-title {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }

      .boot-subtitle {
        margin: 8px 0 0;
        font-size: 14px;
        line-height: 1.5;
        color: var(--muted);
      }

      .boot-progress {
        margin-top: 18px;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }

      .boot-progress::after {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, rgba(89, 178, 255, 0.22), var(--accent), rgba(89, 178, 255, 0.22));
        animation: boot-progress-slide 1.15s ease-in-out infinite;
      }

      .boot-status {
        margin-top: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      .boot-status.is-error {
        color: #ff9c9c;
      }

      @keyframes boot-progress-slide {
        0% {
          transform: translateX(-120%);
        }
        100% {
          transform: translateX(320%);
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-overlay" class="boot-overlay" aria-live="polite">
      <div class="boot-card">
        <h1 class="boot-title">正在載入 Web 版範例</h1>
        <p class="boot-subtitle">首次開啟會下載 Wasm 與相關資產，時間可能稍久。</p>
        <div class="boot-progress"></div>
        <div id="boot-status" class="boot-status">下載與初始化中…</div>
      </div>
    </div>
    <canvas id="app-canvas" tabindex="0"></canvas>
    <script>
      const bootOverlay = document.getElementById("boot-overlay");
      const bootStatus = document.getElementById("boot-status");

      function hideBootOverlay() {
        if (!bootOverlay) {
          return;
        }
        bootOverlay.classList.add("is-hidden");
        window.setTimeout(() => bootOverlay.remove(), 220);
      }

      function setBootError(message) {
        if (!bootStatus) {
          return;
        }
        bootStatus.textContent = message;
        bootStatus.classList.add("is-error");
      }

      if (typeof GPUCanvasContext !== "undefined") {
        const originalConfigure = GPUCanvasContext.prototype.configure;
        GPUCanvasContext.prototype.configure = function(config) {
          const nextConfig = { ...config };
          if (!("colorSpace" in nextConfig) || nextConfig.colorSpace == null) {
            nextConfig.colorSpace = "srgb";
          }
          console.log("[rfgui] intercepted webgpu configure:", nextConfig);
          return originalConfigure.call(this, nextConfig);
        };
      }
    </script>
    <link data-trunk rel="rust" />
    <script>
      window.addEventListener("TrunkApplicationStarted", () => {
        const canvas = document.getElementById("app-canvas");
        const webgpu = canvas?.getContext?.("webgpu");
        const config = webgpu?.getConfiguration?.() ?? null;
        console.log("[rfgui] webgpu canvas config:", config);
        console.log("[rfgui] webgpu canvas colorSpace:", config?.colorSpace ?? null);
        hideBootOverlay();
      });

      window.addEventListener("error", () => {
        setBootError("載入失敗，請重新整理頁面。");
      });

      window.addEventListener("unhandledrejection", () => {
        setBootError("初始化失敗，請查看瀏覽器 console。");
      });
    </script>
  </body>
</html>
